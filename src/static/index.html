<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MangaScan AI — Traducción neuronal de mangas PDF impulsada por DeepSeek V4 Flash">
    <title>MangaScan AI — Traductor de Manga</title>

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>

<body>
    <!-- Dynamic background -->
    <div class="background-anim" aria-hidden="true">
        <div class="orb-glow orb-glow--cool"></div>
        <div class="orb-glow orb-glow--warm"></div>
    </div>

    <div class="container">
        <header>
            <h1>
                MangaScan <span class="accent">AI</span>
            </h1>
            <p class="subtitle">
                Traducción neuronal &middot; DeepSeek V4 Flash
                <span class="badge">Deep Learning</span>
            </p>
        </header>

        <main>
            <!-- Drop Zone -->
            <div id="dropzone" class="glass-panel" role="button" tabindex="0"
                aria-label="Subir archivo PDF de manga para traducción">
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>Sube tu Manga PDF</h2>
                    <p>Arrastra y suelta tu archivo aquí o haz clic para buscar</p>
                    <span class="hint">Solo PDF</span>
                    <input type="file" id="fileInput" accept="application/pdf" hidden>
                </div>
            </div>

            <!-- Progress Panel -->
            <div id="progress-container" class="glass-panel hidden" role="region" aria-live="polite"
                aria-label="Progreso de traducción">
                <div class="status-header">
                    <div style="display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; margin-right: 12px;">
                        <h3 id="status-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0;">Procesando...</h3>
                        <div class="spinner" role="status" aria-label="Cargando" style="flex-shrink: 0;"></div>
                    </div>
                    <button id="cancel-btn" class="btn" style="flex-shrink: 0; background: rgba(239, 68, 68, 0.2); color: var(--accent-error); border: 1px solid rgba(239, 68, 68, 0.3); padding: 0.4rem 0.8rem; font-size: 0.85rem; border-radius: var(--radius-full);">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                        Cancelar
                    </button>
                </div>

                <div class="progress-bar-bg" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                    aria-label="Progreso de traducción">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>

                <div class="terminal-container">
                    <div id="terminal" class="terminal"></div>
                </div>

                <div id="actions-container" style="margin-top: var(--space-lg); display: flex; justify-content: center; gap: 16px;">
                    <button id="reset-btn" class="btn hidden" style="background: rgba(255, 255, 255, 0.08); color: var(--text-primary);">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        Volver al inicio
                    </button>
                    <a id="download-btn" class="btn primary-btn hidden" href="#" download role="button">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Descargar PDF
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js?v=3"></script>
</body>

</html>
